  Gotchas críticos B5 (importantes para B6):
  - confirmSettings: lazy-load en callPlanIntent, NO en $effect (deadlock IDB en tests).
  - localStore: mockear completamente en tests que no necesiten IDB real.
  - waitFor con botones ambiguos: esperar header del modal + botón (no solo el botón).
  - tts.cancel() emite onerror con code:'interrupted', NO onend.
  - recognition.resetToIdle() es no-op en el mock → emitir emit(rec,'state','idle').
  - toBeDisabled() no disponible (sin jest-dom) → usar .disabled === false.
  - Mock TTS necesita _handlers map (patrón b44), no on=vi.fn() de b3.
