  - handleConfirmed() es async: planResponse=null ANTES de executePlan.
  - voiceState reset manual a 'idle' en finally (no depender de resetToIdle).
  - Mock execute-plan-client en b53: incluye ExecutePlanClientError + executePlan.
  - confirmSettings: lazy-load en callPlanIntent, NO en $effect (deadlock IDB).
  - recognition.resetToIdle() es no-op en el mock → emit(rec,'state','idle').
  - tts.cancel() emite onerror con code:'interrupted', NO onend.
  - toBeDisabled() no disponible (sin jest-dom) → usar .disabled === false.
